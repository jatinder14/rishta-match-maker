# Rishta Match Maker (Vite SPA) → Cloud Run.
#
# Secrets (repo or org **hookstep**):
#   GCP_SA_JSON — same deploy SA as Hookstep (Artifact Registry push + Cloud Run deploy + actAs runtime SA).
#   VITE_SUPABASE_URL — production Supabase project URL.
#   VITE_SUPABASE_PUBLISHABLE_KEY — anon / publishable key (safe to embed in the client bundle).
# Optional:
#   VITE_DEFAULT_APP_EMAIL, VITE_STRIPE_SUBSCRIPTION_CHECKOUT_URL
#
# Project/region: jr-consulting-co / us-central1 (edit env block to change).

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tailwind.config.ts"
      - "postcss.config.js"
      - "components.json"
      - "tsconfig.json"
      - "tsconfig.app.json"
      - "tsconfig.node.json"
      - "eslint.config.js"
      - "vitest.config.ts"
      - "Dockerfile"
      - "nginx.conf"
      - ".github/workflows/deploy-cloudrun.yml"
  workflow_dispatch:

concurrency:
  group: rishta-cloudrun-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: jr-consulting-co
  REGION: us-central1
  SERVICE: rishta-match-maker
  AR_REPOSITORY: cloud-run-source-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker build context
        run: |
          set -euo pipefail
          test -f Dockerfile
          test -f nginx.conf
          test -f package-lock.json

      - name: Require Google deploy credentials
        env:
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: |
          if [[ -z "${GCP_SA_JSON:-}" ]]; then
            echo "::error::Set repository (or org) secret **GCP_SA_JSON** — JSON key for the Cloud Run deploy service account."
            exit 1
          fi

      - name: Require Supabase build variables
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [[ -z "${VITE_SUPABASE_URL:-}" || -z "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]]; then
            echo "::error::Set **VITE_SUPABASE_URL** and **VITE_SUPABASE_PUBLISHABLE_KEY** as GitHub Actions secrets (used at docker build for the production bundle)."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Enable required APIs (best effort)
        continue-on-error: true
        run: |
          gcloud services enable run.googleapis.com artifactregistry.googleapis.com \
            --project="${PROJECT_ID}" --quiet \
            || echo "::warning::Skipping API enable (no permission or already enabled). Continuing deploy."

      - name: Ensure Artifact Registry repository
        run: |
          set -euo pipefail
          EC=0
          OUT=$(gcloud artifacts repositories describe "${AR_REPOSITORY}" \
            --location="${REGION}" --project="${PROJECT_ID}" --quiet 2>&1) || EC=$?
          if [[ "$EC" -eq 0 ]]; then
            echo "Repository ${AR_REPOSITORY} already exists."
            exit 0
          fi
          if echo "$OUT" | grep -qiE 'NOT_FOUND|does not exist|404'; then
            echo "Repository missing; creating ${AR_REPOSITORY}..."
            gcloud artifacts repositories create "${AR_REPOSITORY}" \
              --repository-format=docker \
              --location="${REGION}" \
              --project="${PROJECT_ID}" \
              --description="Cloud Run container images" --quiet
            exit 0
          fi
          echo "::warning::Could not verify Artifact Registry repo (describe failed). Assuming ${AR_REPOSITORY} already exists."
          echo "$OUT"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_DEFAULT_APP_EMAIL: ${{ secrets.VITE_DEFAULT_APP_EMAIL }}
          VITE_STRIPE_SUBSCRIPTION_CHECKOUT_URL: ${{ secrets.VITE_STRIPE_SUBSCRIPTION_CHECKOUT_URL }}
        run: |
          set -euo pipefail
          IMAGE_BASE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPOSITORY}/${SERVICE}"
          docker build \
            --build-arg "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}" \
            --build-arg "VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}" \
            --build-arg "VITE_DEFAULT_APP_EMAIL=${VITE_DEFAULT_APP_EMAIL:-}" \
            --build-arg "VITE_STRIPE_SUBSCRIPTION_CHECKOUT_URL=${VITE_STRIPE_SUBSCRIPTION_CHECKOUT_URL:-}" \
            -t "${IMAGE_BASE}:${GITHUB_SHA}" \
            -t "${IMAGE_BASE}:latest" \
            .
          docker push "${IMAGE_BASE}:${GITHUB_SHA}"
          docker push "${IMAGE_BASE}:latest"

      - name: Deploy Cloud Run
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          gcloud run deploy "${SERVICE}" \
            --image="${IMAGE}" \
            --region="${REGION}" \
            --platform=managed \
            --project="${PROJECT_ID}" \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=60 \
            --allow-unauthenticated \
            --no-invoker-iam-check \
            --quiet

      - name: Show service URL
        run: |
          URL="$(gcloud run services describe "${SERVICE}" --region="${REGION}" --project="${PROJECT_ID}" --format='value(status.url)')"
          echo "Rishta Match Maker: ${URL}"
